services:
  - type: web
    name: edit-os-api
    runtime: node
    rootDir: .
    buildCommand: corepack enable && corepack prepare pnpm@9.15.9 --activate && pnpm install && pnpm --filter @edit-os/core build && pnpm --filter @edit-os/services build && pnpm --filter @edit-os/api build
    startCommand: node apps/api/dist/index.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
